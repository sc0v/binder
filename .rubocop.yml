plugins:
  - rubocop-capybara
  - rubocop-minitest
  - rubocop-rails


AllCops:
  NewCops: enable
  Exclude:
    - "bin/**/*"
    - "config/initializers/new_framework_defaults_7_0.rb"
    - "db/schema.rb"
    - "shift_picker.rb"

Style/Documentation:
  Enabled: false

Rails/I18nLocaleTexts:
  Enabled: true

Style/ClassAndModuleChildren:
  Enabled: false

Layout/LineLength:
  Max: 120

# Lint tasks intentionally omit :environment to avoid booting Rails in CI,
# which triggers a network call to login.cmu.edu and causes SocketError.
Rails/RakeEnvironment:
  Enabled: false
