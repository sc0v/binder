plugins:
  - rubocop-capybara
  - rubocop-minitest
  - rubocop-rails

AllCops:
  NewCops: enable
  Exclude:
    - "bin/**/*"
    - "config/initializers/new_framework_defaults_7_0.rb"
    - "db/schema.rb"
    - "node_modules/**/*"
    - "shift_picker.rb"
    - "vendor/**/*"

Style/Documentation:
  Enabled: false

# The following cops conflict with Prettier's formatting decisions.
# Prettier is the canonical formatter; these cops are disabled so the two
# tools don't fight each other.
Style/EmptyMethod:
  EnforcedStyle: expanded
Style/IfUnlessModifier:
  Enabled: false
Layout/FirstArgumentIndentation:
  Enabled: false
Layout/FirstHashElementIndentation:
  Enabled: false
Layout/MultilineMethodCallIndentation:
  Enabled: false
Layout/MultilineOperationIndentation:
  Enabled: false
Layout/LineEndStringConcatenationIndentation:
  Enabled: false
Layout/SpaceAroundKeyword:
  Enabled: false

Rails/I18nLocaleTexts:
  Enabled: true

Style/ClassAndModuleChildren:
  Enabled: false

Layout/LineLength:
  Max: 120

# Lint tasks intentionally omit :environment to avoid booting Rails in CI,
# which triggers a network call to login.cmu.edu and causes SocketError.
Rails/RakeEnvironment:
  Enabled: false
