plugins:
  - rubocop-capybara
  - rubocop-minitest
  - rubocop-rails


AllCops:
  NewCops: enable

Style/Documentation:
  Enabled: false

Rails/I18nLocaleTexts:
  Enabled: true

Style/ClassAndModuleChildren:
  Enabled: false

Layout/LineLength:
  Max: 120

# Lint tasks intentionally omit :environment to avoid booting Rails in CI,
# which triggers a network call to login.cmu.edu and causes SocketError.
Rails/RakeEnvironment:
  Enabled: false
